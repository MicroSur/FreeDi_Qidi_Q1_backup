# for induct probe

[probe]
#[qdprobe] индуктивный датчик стола
pin: !gpio21
x_offset: 17.6
y_offset: 4.4
z_offset: 2.0  # my fr4 1.51
speed: 10
samples: 4
samples_result: median #average
sample_retract_dist: 2.0 #4
samples_tolerance: 0.03 #0.05
samples_tolerance_retries: 3

[z_tilt]
### Induct probe
z_positions:
    -59,125 #mechanic Z rods
    307.5,125
points:
    0,125 # tenzo 15,125 #all other 0,125
    #215,125
    210,125
speed: 300
horizontal_move_z: 5
retries: 3
retry_tolerance: 0.02


[output_pin bed_sensor]
#[output_pin ctlyd]
#piezo
pin: !U_1:PA14
value: 1 #0

[auto_z_offset]
#for Openq1 & FreeDi
#[smart_effector]
pin: U_1:PC1
z_offset: -0.3 #-0.07 default is -0.1
speed: 5 #8
probe_accel: 50
samples: 6 #4 #6
samples_result: median #average
samples_tolerance: 0.03 #0.05
samples_tolerance_retries: 3 #2
prepare_gcode:
    SET_PIN PIN=bed_sensor VALUE=0
    G91
    
    {% set i = 5 %}
    {% for iteration in range(i|int) %}
#        G1 Z1 F900
#        G1 Z-1 F900

#        G1 Z10 F900  #good
#        G1 Z-10 F900        
        
        G1 Z5 F900
        G1 Z-5 F900        
        
    {% endfor %}
    
    G90
    SET_PIN PIN=bed_sensor VALUE=1


#[heater_fan hotend_fan2]
[heater_fan toolhead_fan]
# +5V кулер на голове, красный=белый снизу коннекторы. Если 3д-тач или м-проба - закомментировать это.
pin: gpio11
max_power: 1.0
shutdown_speed: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50 #65.0
fan_speed: 1.0
off_below: 0

[bed_mesh]
### Induct probe
speed: 500
horizontal_move_z: 5 #7 #stock
mesh_min: 20,15
mesh_max: 230,230 #induct & 3dtouch 230,230
zero_reference_position: 125,125 #120, 120
probe_count: 8,8 #bicubic
#probe_count: 6,6 #lagrange
algorithm: bicubic #lagrange 
bicubic_tension: 0.2 #stock Default Value: 0.2
adaptive_margin: 5
mesh_pps: 2, 2 #stock
fade_start: 1.0 #def
fade_end: 10.0 #rec, def 0
#vibrate_gcode:
#    Z_DOUDONG  #stock


[bed_screws]
### Induct probe
screw1: 10,10
screw1_name: Front left
screw2: 230,10
screw2_name: Front right
screw3: 125,240
screw3_name: Back center
probe_height: 0.2
horizontal_move_z: 10

