# 2026
# Upstream Klipper now uses the sg4_thrs register value to select the
# homing path on TMC2240: non-zero triggers SG4/StealthChop homing,
# zero uses SGT/SpreadCycle. Autotune's default of 40 conflicted with
# its own SpreadCycle and CoolStep configuration, breaking sensorless
# homing.

# Default sg4_thrs to 0 for TMC2240 only (matching Klipper's own
# default), keeping 40 for TMC2209 where it controls sgthrs. Users
# can still opt into SG4 homing by explicitly setting sg4_thrs.

# used for X/Y-axis on QIDI X MAX 3
#resistance: 1.4
#inductance: 0.0026
#holding_torque: 0.41
#max_current: 1.5
#steps_per_revolution: 200

## tmc2240 for X Y
[autotune_tmc stepper_x]
motor: qidi-bj42d29-28v07
sgt: 1
#sg4_thrs: 0 # fix sensorless homing in 2026, no more need

[autotune_tmc stepper_y]
motor: qidi-bj42d29-28v07
sgt: 1
#sg4_thrs: 0 # fix sensorless homing in 2026, no more need

# used for Z-Axis on QIDI X MAX 3
#resistance: 4.7
#inductance: 0.011
#holding_torque: 0.6
#max_current: 1.2
#steps_per_revolution: 200

## tmc2209 for Z
[autotune_tmc stepper_z]
motor: qidi-BJ42D29-22V08

[autotune_tmc stepper_z1]
motor: qidi-BJ42D29-22V08


