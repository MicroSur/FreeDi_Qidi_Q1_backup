######################################     STEPPERS     #######################

[extruder]
step_pin: gpio5
dir_pin: gpio4
enable_pin: !gpio10
rotation_distance: 54.5 #53.7  #22.6789511    #Bondtech 5mm Drive Gears
gear_ratio: 1517:170
microsteps: 16 #128 #16 #32
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
min_temp: 5
max_temp: 360
min_extrude_temp: 170
#smooth_time: 0.000001
smooth_time: 1.0
#   A time value (in seconds) over which temperature measurements will
#   be smoothed to reduce the impact of measurement noise. The default
#   is 1 seconds.
heater_pin: gpio24
sensor_type: MAX6675
sensor_pin: gpio17
spi_software_sclk_pin: gpio18
spi_software_mosi_pin: gpio19
spi_software_miso_pin: gpio16
spi_speed: 100000
max_power: 1
#control = pid
#pid_Kp = 43.290
#pid_Ki = 8.246
#pid_Kd = 56.818
pressure_advance: 0.00
pressure_advance_smooth_time: 0.04
max_extrude_cross_section: 999999 #500 #The default is: 4.0 * nozzle_diameter^2
instantaneous_corner_velocity: 1.0 #klipper = 1.0 #stock = 10.000  #The maximum instantaneous velocity change (in mm/s) of the extruder during the junction of two moves. The default is 1mm/s.
max_extrude_only_distance: 1000.0
max_extrude_only_velocity: 5000
max_extrude_only_accel: 2000
step_pulse_duration: 0.0000001 #0.000002

[stepper_x]
step_pin: U_1:PB4
dir_pin: !U_1:PB3
enable_pin: !U_1:PB5
microsteps: 32
rotation_distance: 38.88 # 1.5GT = 39.0 ( 26 teeth * 1.5 GT ) #orig for 2GT = 39.88 #more = shorter distance
full_steps_per_rotation: 200  #set to 400 for 0.9 degree stepper
endstop_pin: tmc2240_stepper_x:virtual_endstop
position_min: -5.5
position_endstop: -3 #-5.5
position_max: 245
homing_speed: 100 #50
homing_retract_dist: 5 #0 #Set this to 0 to disable the second home.
homing_retract_speed: 80 # def = homing_speed
second_homing_speed: 50 #default is homing_speed/2
homing_positive_dir: False
step_pulse_duration: 0.0000001

[stepper_y]
step_pin: U_1:PC14
dir_pin: !U_1:PC13
enable_pin: !U_1:PC15
microsteps: 32
rotation_distance: 38.88 # 1.5GT = 39.0 # orig:39.88
full_steps_per_rotation: 200  #set to 400 for 0.9 degree stepper
endstop_pin: tmc2240_stepper_y:virtual_endstop
position_min: -4.5
position_endstop: -2 #-4.5
position_max: 258 #my 256
homing_speed: 100 #50
homing_retract_dist: 5
homing_retract_speed: 80 # def = homing_speed
second_homing_speed: 50 #default is homing_speed/2
homing_positive_dir: False
step_pulse_duration: 0.0000001


