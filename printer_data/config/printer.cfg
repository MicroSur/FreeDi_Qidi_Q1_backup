[delayed_gcode board_fan_control]
# Startup code
initial_duration: 3
gcode:
      SET_FAN_SPEED FAN=board_fan SPEED=0.4
      SET_FAN_SPEED FAN=filterfan SPEED=0.4 #for freedi lcd clone

      #once
      #SAVE_VARIABLE VARIABLE=my_y_max VALUE=255 #with XY home ofsets
      {% if printer.save_variables.variables.my_y_max !=255 %}
        SAVE_VARIABLE VARIABLE=my_y_max VALUE=255 #with XY home ofsets
      {% endif %}

      # {% if printer.save_variables.variables.adaptive %}
      #   M118 Mesh = ADAPTIVE
      # {% else %}
      #   M118 Mesh = {current_mesh}
      # {% endif %}

      ENABLE_SFS_SENSOR #check insertion inside macros with additional pico pin

[idle_timeout]
gcode:
    M117 Idle state
    M118 Idle state
    TURN_OFF_HEATERS
    M84 # Выключение всех моторов осей
    
    SET_FAN_SPEED FAN=board_fan SPEED=0.2
    SET_FAN_SPEED FAN=filterfan SPEED=0.2 #unused fan - clone for freedi lcd to show

    SET_PIN PIN=caselight value=0
timeout: 2400


