[pause_resume]
[display_status]
[exclude_object]
[skew_correction]
[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: PAUSE
[save_variables]
filename: ~/printer_data/config/saved_variables.cfg
#[resonance_tester] in Q1.cfg
[respond]
#default_type: echo
[force_move]
enable_force_move : True
[gcode_arcs]
#resolution: 1.0

[shaketune]
#result_folder: ~/printer_data/config/ShakeTune_results
keep_raw_data: False
measurements_chunk_size: 18 #15-20  #def min "2" is a very conservative setting to avoid Klipper Timer Too Close errors on lower end devices with little RAM

[printer]
kinematics: corexy
max_velocity: 600
max_accel: 10000
max_z_velocity: 15
max_z_accel: 500
square_corner_velocity: 5 #8

[input_shaper]
# shaper_type_x: ei
# shaper_freq_x: 64.8
# DAMPING_RATIO_X: 0.033
# shaper_type_y: ei
# shaper_freq_y: 64.6
# DAMPING_RATIO_Y: 0.045
shaper_type_x: ei
shaper_freq_x: 67.8
DAMPING_RATIO_X: 0.041
shaper_type_y: ei
shaper_freq_y: 61.4
DAMPING_RATIO_Y: 0.05

[firmware_retraction]
retract_length: 0 # set in slicer
retract_speed: 10
unretract_speed: 10
unretract_extra_length: 0


