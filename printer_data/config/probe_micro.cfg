
#for microprobe btt
#PROBE_ACCURACY
#Для управления штоком датчика нужен потенциальный, а не PWM сигнал как у BLTouch. 

[probe]
# probe pin
pin: ^!gpio21
x_offset: 28 #24
y_offset: 10.0
z_offset: 0.4 #must be configured individualy
speed: 7
samples: 3
activate_gcode:
    probe_deploy
    G4 P600
deactivate_gcode:
    probe_stow
deactivate_on_each_sample: false

# [bltouch]
# #good if change wires yellow to 11 white to 21
# sensor_pin: gpio21 # Probe
# control_pin: !gpio11 # Servo
# x_offset: 29 #induct 17.6 #3d-touch 29
# y_offset: 4.4
# z_offset: 1.87 #orig nozzle 1.75 # 3dtouch 1.75 # z_offset = 2.086  # чем больше, тем ближе к столу сопло
# speed: 7.0 
# lift_speed: 10
# samples: 3
# samples_result: median #average
# sample_retract_dist: 2.0
# samples_tolerance: 0.05
# samples_tolerance_retries: 3

[output_pin probe_enable]
# servo pin
pin: gpio11
value: 1
				  
[gcode_macro probe_deploy]
gcode:
    SET_PIN PIN=probe_enable VALUE=0

[gcode_macro probe_stow]
gcode:
    SET_PIN PIN=probe_enable VALUE=1

[z_tilt]
### microprobe
z_positions:
    -59,125 #mechanic Z rods
    307.5,125
points:
    0,125 # tenzo 15,125 #all other 0,125
    190,125 #tenzo 225,125 #inductive probe = 215,125  # 3d-touch 190,125
speed: 600 #300
horizontal_move_z: 5
retries: 3
retry_tolerance: 0.02


[bed_mesh]
### microp
speed: 500
horizontal_move_z: 5 #7 #stock
mesh_min: 32,15 #3dtouch=32,15  20,15=ind
mesh_max: 230,230 #induct & 3dtouch 230,230
zero_reference_position: 125, 120
probe_count: 10,10
algorithm: bicubic
bicubic_tension: 0.2 #stock
adaptive_margin: 5
mesh_pps: 2, 2 #stock
fade_start: 1.0 #def
fade_end: 10.0 #rec, def 0
#vibrate_gcode:
#    Z_DOUDONG  #stock


[bed_screws]
### microp
# BED_SCREWS_ADJUST for paper test
screw1: 10,10
screw1_name: Front left
screw2: 190,10 #ind 230,10
screw2_name: Front right
screw3: 93,240 #ind 125,240
screw3_name: Back center
probe_height: 0.2
horizontal_move_z: 10
speed: 300 #50
probe_height: 0 # The height of the probe (in mm) after adjusting for the thermal expansion of bed and nozzle. The default is zero.

# [screws_tilt_adjust]
