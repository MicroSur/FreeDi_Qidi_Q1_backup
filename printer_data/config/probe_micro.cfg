[screws_tilt_adjust]
### microp BASE Back center
# SCREWS_TILT_CALCULATE for probe test
screw1: 93,210 #blt 93,230 #ind 125,230
screw1_name: Back center
screw2: 10,30
screw2_name: Front left
screw3: 190,30 #blt 190,10 #ind 220,10
screw3_name: Front right

screw_thread: CW-M4
speed: 600 #50
horizontal_move_z: 5 #5

